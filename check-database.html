<!DOCTYPE html>
<html>
<head>
    <title>Revisar Base de Datos - NEOS TECH</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1f3a; color: #fff; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #2563eb; color: #fff; border: none; border-radius: 5px; }
        button:hover { background: #1d4ed8; }
        pre { background: #000; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
    </style>
</head>
<body>
    <h1>🔍 Revisar Base de Datos NEOS TECH</h1>
    
    <div>
        <button onclick="checkUsers()">1. Ver Usuarios</button>
        <button onclick="cleanUsers()">2. Limpiar Campos Viejos</button>
        <button onclick="createSampleUsers()">3. Crear Usuarios de Ejemplo</button>
        <button onclick="migrateUsers()">4. Migrar unit/type → departamento/block</button>
    </div>
    
    <div id="output"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ-XRSRgC2gz9E6zdYpes7yv5nLZtKmSw",
            authDomain: "neos-tech.firebaseapp.com",
            projectId: "neos-tech",
            storageBucket: "neos-tech.firebasestorage.app",
            messagingSenderId: "738411977369",
            appId: "1:738411977369:web:7facc71cea4c271d217608"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : '';
            output.innerHTML += `<div class="${className}">${message}</div>`;
        }

        async function checkUsers() {
            document.getElementById('output').innerHTML = '<h2>📊 Usuarios en Firestore:</h2>';
            
            try {
                const snapshot = await db.collection('users').get();
                
                if (snapshot.empty) {
                    log('⚠️ No hay usuarios en la base de datos', 'warning');
                    return;
                }
                
                log(`Total de usuarios: ${snapshot.size}`, 'success');
                log('<pre>');
                
                snapshot.forEach((doc, index) => {
                    const data = doc.data();
                    log(`\n--- Usuario ${index + 1} ---`);
                    log(`ID: ${doc.id}`);
                    log(`Nombre: ${data.name || 'N/A'}`);
                    log(`Unit (viejo): ${data.unit || 'NO EXISTE'}`);
                    log(`Type (viejo): ${data.type || 'NO EXISTE'}`);
                    log(`Departamento (nuevo): ${data.departamento || 'NO EXISTE'}`);
                    log(`Block (nuevo): ${data.block || 'NO EXISTE'}`);
                    log(`Phone: ${data.phone || 'N/A'}`);
                    log(`Email: ${data.email || 'N/A'}`);
                    log(`Tags: ${JSON.stringify(data.tags || [])}`);
                    log(`Active: ${data.active}`);
                });
                
                log('</pre>');
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function migrateUsers() {
            document.getElementById('output').innerHTML = '<h2>🔄 Migrando usuarios...</h2>';
            
            try {
                const snapshot = await db.collection('users').get();
                let migrated = 0;
                
                const batch = db.batch();
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    
                    // Migrar si tiene unit/type pero no departamento/block
                    if ((data.unit || data.type) && !data.departamento) {
                        batch.update(doc.ref, {
                            departamento: data.unit || 'SIN ASIGNAR',
                            block: data.type || 'Torre A',
                            // Eliminar campos viejos
                            unit: firebase.firestore.FieldValue.delete(),
                            type: firebase.firestore.FieldValue.delete()
                        });
                        migrated++;
                        log(`✅ Migrando: ${data.name} - ${data.unit} → ${data.unit || 'SIN ASIGNAR'}`, 'success');
                    }
                });
                
                if (migrated > 0) {
                    await batch.commit();
                    log(`\n✅ ${migrated} usuarios migrados exitosamente`, 'success');
                } else {
                    log('ℹ️ No hay usuarios para migrar', 'warning');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function cleanUsers() {
            document.getElementById('output').innerHTML = '<h2>🧹 Limpiando campos viejos...</h2>';
            
            try {
                const snapshot = await db.collection('users').get();
                let cleaned = 0;
                
                const batch = db.batch();
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    
                    // Solo eliminar campos viejos si ya tiene los nuevos
                    if (data.departamento && (data.unit || data.type)) {
                        batch.update(doc.ref, {
                            unit: firebase.firestore.FieldValue.delete(),
                            type: firebase.firestore.FieldValue.delete()
                        });
                        cleaned++;
                        log(`🧹 Limpiando: ${data.name}`, 'success');
                    }
                });
                
                if (cleaned > 0) {
                    await batch.commit();
                    log(`\n✅ ${cleaned} usuarios limpiados`, 'success');
                } else {
                    log('ℹ️ No hay campos viejos para limpiar', 'warning');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function createSampleUsers() {
            document.getElementById('output').innerHTML = '<h2>➕ Creando usuarios de ejemplo...</h2>';
            
            // Primero, eliminar todos los usuarios existentes
            try {
                const existingSnapshot = await db.collection('users').get();
                const batch1 = db.batch();
                existingSnapshot.forEach(doc => {
                    batch1.delete(doc.ref);
                });
                await batch1.commit();
                log('🗑️ Usuarios antiguos eliminados', 'warning');
            } catch (e) {
                log('Sin usuarios previos', 'info');
            }
            
            const sampleUsers = [
                {
                    name: 'María González',
                    departamento: '1-101',
                    block: '1',
                    phone: '+593987654321',
                    email: 'maria.gonzalez@example.com',
                    vehicle: 'ABC-1234',
                    tags: ['300833B2DDD9014000000001'],
                    active: true
                },
                {
                    name: 'Carlos Rodríguez',
                    departamento: '2-205',
                    block: '2',
                    phone: '+593987654322',
                    email: 'carlos.rodriguez@example.com',
                    vehicle: 'DEF-5678',
                    tags: ['300833B2DDD9014000000002'],
                    active: true
                },
                {
                    name: 'Ana Martínez',
                    departamento: '3-310',
                    block: '3',
                    phone: '+593987654323',
                    email: 'ana.martinez@example.com',
                    vehicle: 'GHI-9012',
                    tags: ['300833B2DDD9014000000003', 'E0040150B6FC9C25'],
                    active: true
                },
                {
                    name: 'Juan Pérez Demo',
                    departamento: '14-305',
                    block: '14',
                    phone: '+593987654324',
                    email: 'juan.perez@demo.com',
                    vehicle: 'JKL-3456',
                    tags: ['300833B2DDD9014000000000', 'E0040150B6FC9C26', 'A1B2C3D4E5F60708', '1234567890ABCDEF'],
                    active: true
                },
                {
                    name: 'Luis Fernández',
                    departamento: '7-102',
                    block: '7',
                    phone: '+593987654325',
                    email: 'luis.fernandez@example.com',
                    vehicle: 'MNO-7890',
                    tags: ['400833B2DDD9014000000004'],
                    active: true
                },
                {
                    name: 'Patricia Sánchez',
                    departamento: '10-201',
                    block: '10',
                    phone: '+593987654326',
                    email: 'patricia.sanchez@example.com',
                    vehicle: 'PQR-1122',
                    tags: ['500833B2DDD9014000000005'],
                    active: true
                }
            ];
            
            try {
                const batch = db.batch();
                
                for (const user of sampleUsers) {
                    const ref = db.collection('users').doc();
                    batch.set(ref, {
                        ...user,
                        created_at: firebase.firestore.FieldValue.serverTimestamp(),
                        updated_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    log(`✅ Creando: ${user.name} - ${user.departamento} - ${user.block}`, 'success');
                }
                
                await batch.commit();
                log(`\n✅ ${sampleUsers.length} usuarios de ejemplo creados`, 'success');
                log('\n🔄 Recarga http://localhost:5000 para ver los cambios', 'success');
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
