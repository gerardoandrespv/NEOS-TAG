<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Diseño del logo: Un escudo con elementos tecnológicos que representa seguridad y acceso -->
  <defs>
    <!-- Gradiente para el escudo -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente para los detalles -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd0e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Escudo de seguridad -->
  <path d="M 30 10 L 40 5 L 40 25 C 40 35, 35 40, 30 45 C 25 40, 20 35, 20 25 L 20 5 Z" 
        fill="url(#shieldGradient)" stroke="#0097a7" stroke-width="1.5"/>
  
  <!-- Símbolo de RFID/Ondas -->
  <g transform="translate(30, 25)">
    <circle cx="0" cy="0" r="2" fill="white"/>
    <path d="M -5 0 A 5 5 0 0 1 5 0" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
    <path d="M -8 0 A 8 8 0 0 1 8 0" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M -11 0 A 11 11 0 0 1 11 0" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Candado de seguridad estilizado -->
  <rect x="27" y="32" width="6" height="7" rx="1" fill="white" opacity="0.9"/>
  <path d="M 28 32 L 28 29 A 2 2 0 0 1 32 29 L 32 32" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  
  <!-- Texto "NEOS" -->
  <text x="50" y="25" font-family="'Roboto', 'Arial', sans-serif" font-size="18" font-weight="700" fill="#1a237e">
    NEOS
  </text>
  
  <!-- Texto "TECH" -->
  <text x="50" y="42" font-family="'Roboto', 'Arial', sans-serif" font-size="14" font-weight="500" fill="#00bcd4" letter-spacing="2">
    TECH
  </text>
  
  <!-- Línea decorativa -->
  <line x1="50" y1="28" x2="95" y2="28" stroke="#00bcd4" stroke-width="2" opacity="0.3"/>
</svg>
