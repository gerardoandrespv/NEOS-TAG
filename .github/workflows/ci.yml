name: CI — NeosTech RFID System Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Verificar archivos críticos del PWA
  # ──────────────────────────────────────────
  web_sanity:
    name: Web Sanity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify critical web files
        run: |
          missing=0
          for f in \
            src/web/dashboard-v3.html \
            src/web/sw.js \
            src/web/css/dashboard-v3.css \
            src/web/js/dashboard-v3.js; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          exit $missing

  # ──────────────────────────────────────────
  # JOB 2: Build debug APK (sin keystore)
  # ──────────────────────────────────────────
  android_debug_build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # settings.gradle referencia ../node_modules/@react-native/gradle-plugin
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/SAEMobile/package-lock.json

      - name: Install JS dependencies
        working-directory: src/SAEMobile
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew está en git con modo 100644 (no ejecutable)
      - name: Make gradlew executable
        working-directory: src/SAEMobile/android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: src/SAEMobile/android
        run: ./gradlew assembleDebug
