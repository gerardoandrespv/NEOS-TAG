name: CI/CD Pipeline - NeosTech RFID

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18'

jobs:
  # ========================================
  # JOB 1: Linting & Type Checking
  # ========================================
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python Linters
        run: |
          pip install flake8 mypy black pylint bandit
      
      - name: Lint Python Code
        run: |
          flake8 src/functions --max-line-length=120 --exclude=venv,__pycache__
          black --check src/functions --exclude=venv
          pylint src/functions/*.py --disable=C0111,R0903
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Lint C# Code
        run: |
          dotnet format src/Gateway/Rfid_gateway.csproj --verify-no-changes --severity warn

  # ========================================
  # JOB 2: Unit Tests (Python + C#)
  # ========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Python Unit Tests
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Dependencies
        run: |
          cd src/functions
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock responses
      
      - name: Run Python Unit Tests
        run: |
          cd src/functions
          pytest tests/unit \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=test-results/python-unit.xml
      
      - name: Upload Python Coverage
        uses: codecov/codecov-action@v3
        with:
          files: src/functions/coverage.xml
          flags: python-unit
      
      # C# Unit Tests
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore .NET Dependencies
        run: dotnet restore src/Gateway/Rfid_gateway.csproj
      
      - name: Build Gateway
        run: dotnet build src/Gateway/Rfid_gateway.csproj --no-restore
      
      - name: Run C# Unit Tests
        run: |
          dotnet test tests/Gateway.UnitTests/Gateway.UnitTests.csproj \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=dotnet-unit.trx" \
            --results-directory test-results \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:Threshold=60
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results/

  # ========================================
  # JOB 3: Integration Tests (con Firestore Emulator)
  # ========================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      firestore:
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
        ports:
          - 8080:8080
        env:
          FIRESTORE_PROJECT_ID: neos-tech-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Dependencies
        run: |
          cd src/functions
          pip install -r requirements.txt
          pip install pytest pytest-mock requests-mock
      
      - name: Start Firestore Emulator
        run: |
          gcloud emulators firestore start --host-port=localhost:8080 &
          sleep 5
      
      - name: Run Integration Tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: |
          cd src/functions
          pytest tests/integration \
            --junitxml=test-results/python-integration.xml
      
      - name: Run C# Integration Tests (RFID Simulator)
        run: |
          dotnet test tests/Gateway.IntegrationTests/Gateway.IntegrationTests.csproj \
            --logger "trx;LogFileName=dotnet-integration.trx" \
            --results-directory test-results

  # ========================================
  # JOB 4: Security Scanning
  # ========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Secret Scanning
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
      
      # Python Dependency Check
      - name: Python Safety Check
        run: |
          pip install safety
          cd src/functions
          safety check --json --output safety-report.json || true
      
      # SAST - Python (Bandit)
      - name: Python SAST (Bandit)
        run: |
          pip install bandit
          bandit -r src/functions -f json -o bandit-report.json || true
      
      # SAST - C# (Security Code Scan)
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: C# Security Scan
        run: |
          dotnet tool install --global security-scan
          security-scan src/Gateway/Rfid_gateway.csproj
      
      # Firestore Rules Testing
      - name: Test Firestore Rules
        run: |
          npm install -g @firebase/rules-unit-testing
          cd tests/firestore-rules
          npm test
      
      - name: Upload Security Reports
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: bandit-report.json

  # ========================================
  # JOB 5: E2E Tests (Playwright)
  # ========================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Dependencies
        run: |
          cd tests/e2e
          npm ci
      
      - name: Install Playwright Browsers
        run: |
          cd tests/e2e
          npx playwright install --with-deps chromium
      
      - name: Start Firebase Emulators
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only hosting,firestore &
          sleep 10
      
      - name: Run E2E Tests
        run: |
          cd tests/e2e
          npx playwright test --reporter=html,junit
      
      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  # ========================================
  # JOB 6: Performance Tests
  # ========================================
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Locust
        run: pip install locust
      
      - name: Run Performance Tests
        run: |
          cd tests/performance
          locust -f loadtest.py --headless \
            --users 100 \
            --spawn-rate 10 \
            --run-time 60s \
            --html report.html
      
      - name: Upload Performance Report
        uses: actions/upload-artifact@v3
        with:
          name: performance-report
          path: tests/performance/report.html

  # ========================================
  # Quality Gates
  # ========================================
  quality-gate:
    name: Quality Gate
    needs: [lint, unit-tests, integration-tests, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check Quality Metrics
        run: |
          echo "✅ All quality checks passed"
          echo "Coverage threshold: 70%"
          echo "Security issues: 0 critical"
