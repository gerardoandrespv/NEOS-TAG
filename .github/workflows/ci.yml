name: CI/CD Pipeline - NeosTech RFID

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web_sanity:
    name: Web Sanity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify critical web files
        run: |
          for f in \
            src/web/dashboard-v3.html \
            src/web/sw.js \
            src/web/css/dashboard-v3.css \
            src/web/js/dashboard-v3.js; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

  android_debug_build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        working-directory: src/SAEMobile
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        working-directory: src/SAEMobile/android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: src/SAEMobile/android
        run: ./gradlew assembleDebug