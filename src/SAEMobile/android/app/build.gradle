apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

// Accede a ~/.gradle/gradle.properties primero, luego a variables de entorno.
def getProp(String name) {
    return project.findProperty(name) ?: System.getenv(name)
}

// Lanza IllegalStateException con mensaje claro si falta la propiedad.
// Usado en gradle.taskGraph.whenReady (no en fase de configuracion).
def requireProp(String name) {
    def val = getProp(name)
    if (val == null || val.toString().trim().isEmpty()) {
        throw new IllegalStateException(
            "[SAEMobile] Propiedad de firma requerida ausente: '${name}'.\n" +
            "Define en ~/.gradle/gradle.properties o como variable de entorno."
        )
    }
    return val.toString()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

// Validacion de propiedades SAE_* para signing de release.
// Se ejecuta DESPUES de resolver el task graph, ANTES de la ejecucion.
// assembleDebug no incluye tareas de release en el grafo -> no valida SAE_*.
// assembleRelease incluye tareas release -> valida y lanza si faltan props.
// Esto evita usar startParameter.taskNames (poco fiable con tareas calificadas).
gradle.taskGraph.whenReady { graph ->
    if (graph.allTasks.any { t -> t.name.toLowerCase().contains('release') }) {
        requireProp("SAE_STORE_FILE")
        requireProp("SAE_STORE_PASSWORD")
        requireProp("SAE_KEY_ALIAS")
        requireProp("SAE_KEY_PASSWORD")
    }
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.saemobile"

    defaultConfig {
        applicationId "com.saemobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            cmake {
                // Override broken prefab header (std::format -> std::to_string)
                // sin tocar el Gradle cache inmutable.
                cppFlags "-I${projectDir.absolutePath}/src/main/cpp/overrides"
            }
        }
    }

    // Windows-only: ruta corta para evitar MAX_PATH (260 chars).
    // En Linux/CI se omite; Gradle usa el staging por defecto.
    if (System.properties['os.name'].toLowerCase().contains('windows')) {
        externalNativeBuild {
            cmake {
                buildStagingDirectory "C:/b"
            }
        }
    }

    signingConfigs {
        debug {
            // debug.keystore por defecto (React Native/Android).
        }
        release {
            // Se asignan solo si las variables existen.
            // Si faltan, la validacion en gradle.taskGraph.whenReady (arriba)
            // ya habra lanzado IllegalStateException antes de llegar a este punto.
            // Sin props: storeFile queda null -> release sin firma (no debug signing).
            def sf = getProp("SAE_STORE_FILE")
            def sp = getProp("SAE_STORE_PASSWORD")
            def ka = getProp("SAE_KEY_ALIAS")
            def kp = getProp("SAE_KEY_PASSWORD")
            if (sf) storeFile     file(sf)
            if (sp) storePassword sp
            if (ka) keyAlias      ka
            if (kp) keyPassword   kp
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Sin fallback a debug signing.
            // Si faltan SAE_*, taskGraph.whenReady falla antes de que Gradle
            // intente firmar con un signingConfig incompleto.
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
        }
    }
}

/**
 * Configuracion React Native.
 *
 * hermesCommand: fake-hermesc.js copia el bundle sin compilar a HBC.
 * Hermes detecta ausencia de magic bytes y corre el JS en JIT.
 * Workaround para Windows donde hermes-compiler no incluye win64-bin.
 * En debug, el bundle no se genera (Metro lo sirve en vivo), asi que
 * este comando no se invoca durante assembleDebug.
 */
react {
    hermesCommand = "node $rootDir/fake-hermesc.js"
    hermesFlags = []

    autolinkLibrariesWithApp()
}

dependencies {
    // La version de react-native la fija el React Native Gradle Plugin.
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
