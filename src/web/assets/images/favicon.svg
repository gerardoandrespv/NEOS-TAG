<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo con degradado -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  
  <!-- Ondas RFID -->
  <path d="M 32 32 Q 24 24, 24 32 Q 24 40, 32 32" fill="none" stroke="url(#waveGrad)" stroke-width="2.5" opacity="0.6"/>
  <path d="M 32 32 Q 20 20, 16 32 Q 20 44, 32 32" fill="none" stroke="url(#waveGrad)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 32 32 Q 16 16, 8 32 Q 16 48, 32 32" fill="none" stroke="url(#waveGrad)" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Chip RFID central -->
  <rect x="30" y="26" width="18" height="18" rx="3" fill="#ffffff"/>
  <rect x="32" y="28" width="14" height="14" rx="2" fill="#0066cc" opacity="0.8"/>
  <line x1="35" y1="35" x2="43" y2="35" stroke="#ffffff" stroke-width="2"/>
  <line x1="39" y1="31" x2="39" y2="39" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Letra N estilizada -->
  <text x="49" y="46" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">
    N
  </text>
</svg>
