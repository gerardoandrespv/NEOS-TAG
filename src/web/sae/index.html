<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SAE" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/sae/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/images/neostechb.png" />
  <title>SAE — neostech</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f172a; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    #header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #header img { width: 28px; height: 28px; border-radius: 6px; }
    #header span { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    #header .badge {
      margin-left: auto; font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-live { background: #dc2626; color: #fff; animation: pulse 2s infinite; }
    .badge-ok   { background: #16a34a; color: #fff; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    #main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    #status-card {
      border-radius: 14px; padding: 28px 20px; text-align: center;
      transition: background 0.4s, border-color 0.4s;
    }
    .status-ok    { background: rgba(22,163,74,0.15); border: 1px solid rgba(22,163,74,0.4); }
    .status-alert { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.4); }
    .status-wait  { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

    #status-icon { font-size: 48px; line-height: 1; margin-bottom: 10px; }
    #status-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    #status-sub   { font-size: 13px; color: #94a3b8; margin-top: 4px; }

    .alert-item {
      border-radius: 12px; padding: 14px 16px;
      background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.35);
      display: flex; gap: 12px; align-items: flex-start;
    }
    .alert-item.sev-low {
      background: rgba(234,179,8,0.1); border-color: rgba(234,179,8,0.35);
    }
    .alert-icon { font-size: 28px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-type { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #f87171; margin-bottom: 3px; }
    .alert-item.sev-low .alert-type { color: #fbbf24; }
    .alert-msg  { font-size: 14px; line-height: 1.5; color: #e2e8f0; }
    .alert-time { font-size: 11px; color: #64748b; margin-top: 4px; }

    #err-card {
      display: none; border-radius: 14px; padding: 20px;
      background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.3);
      text-align: center; font-size: 13px; color: #fbbf24;
    }

    #footer {
      padding: 12px 16px; text-align: center;
      font-size: 11px; color: #334155;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>

  <!-- Firebase SDK 8 — Auth incluido solo porque firebase-config.js lo requiere;
       NO se llama signInAnonymously, la regla Firestore permite request.auth == null -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="/firebase-config.js"></script>
</head>
<body>

  <div id="header">
    <img src="/assets/images/neostechb.png" alt="neostech" />
    <span>Sistema de Alertas — SAE</span>
    <span class="badge badge-wait" id="liveBadge">—</span>
  </div>

  <div id="main">
    <div id="status-card" class="status-wait">
      <div id="status-icon">⏳</div>
      <div id="status-title">Conectando...</div>
      <div id="status-sub">Obteniendo estado del sistema</div>
    </div>

    <div id="alerts-list"></div>
    <div id="err-card">No se pudo conectar al sistema SAE.<br>Verifica tu conexión o escanea el QR nuevamente.</div>
  </div>

  <div id="footer">neostech · Sistema de Alertas de Emergencia</div>

  <script>
    // ─── Leer clientId desde URL param ?c=XXX ───────────────────────────────
    const params   = new URLSearchParams(location.search);
    const clientId = params.get('c');

    const statusCard  = document.getElementById('status-card');
    const statusIcon  = document.getElementById('status-icon');
    const statusTitle = document.getElementById('status-title');
    const statusSub   = document.getElementById('status-sub');
    const alertsList  = document.getElementById('alerts-list');
    const errCard     = document.getElementById('err-card');
    const liveBadge   = document.getElementById('liveBadge');

    const ALERT_ICONS = {
      FIRE:        '🔥',
      FLOOD:       '🌊',
      EVACUATION:  '🚨',
      ROBBERY:     '🔴',
      FIGHT:       '⚠️',
      POWER_OUTAGE:'⚡',
      GENERAL:     '❗',
    };
    const ALERT_LABELS = {
      FIRE:         'Incendio',
      FLOOD:        'Inundación',
      EVACUATION:   'Evacuación',
      ROBBERY:      'Robo',
      FIGHT:        'Pelea',
      POWER_OUTAGE: 'Corte de luz',
      GENERAL:      'Emergencia general',
    };

    function fmtTime(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    }

    function renderAlerts(docs) {
      const active = docs.filter(d => d.status === 'ACTIVE');

      if (active.length === 0) {
        statusCard.className = 'status-card status-ok';
        statusIcon.textContent  = '✅';
        statusTitle.textContent = 'Sistema operando normal';
        statusSub.textContent   = 'No hay alertas activas en este momento';
        liveBadge.className     = 'badge badge-ok';
        liveBadge.textContent   = 'OK';
        alertsList.innerHTML    = '';
      } else {
        statusCard.className = 'status-card status-alert';
        statusIcon.textContent  = '🚨';
        statusTitle.textContent = active.length === 1
          ? '1 alerta activa'
          : `${active.length} alertas activas`;
        statusSub.textContent   = 'Sigue las instrucciones del personal';
        liveBadge.className     = 'badge badge-live';
        liveBadge.textContent   = 'ALERTA';

        alertsList.innerHTML = active.map(a => {
          const icon  = ALERT_ICONS[a.type]  || '❗';
          const label = ALERT_LABELS[a.type] || a.type;
          const lowCls = a.severity === 'low' ? ' sev-low' : '';
          return `<div class="alert-item${lowCls}">
            <div class="alert-icon">${icon}</div>
            <div class="alert-body">
              <div class="alert-type">${label}</div>
              <div class="alert-msg">${a.message || ''}</div>
              <div class="alert-time">${fmtTime(a.created_at)}</div>
            </div>
          </div>`;
        }).join('');
      }
    }

    function subscribeAlerts() {
      if (!clientId) {
        statusCard.className = 'status-card status-wait';
        statusIcon.textContent  = '🔗';
        statusTitle.textContent = 'QR inválido';
        statusSub.textContent   = 'Este código QR no contiene un ID de edificio válido.';
        return;
      }

      firebase.firestore()
        .collection('emergency_alerts')
        .where('clientId', '==', clientId)
        .where('status', '==', 'ACTIVE')
        .orderBy('created_at', 'desc')
        .onSnapshot(
          snap => renderAlerts(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          err  => {
            console.error('[SAE] Firestore error:', err);
            statusCard.className = 'status-card status-wait';
            statusIcon.textContent  = '📡';
            statusTitle.textContent = 'Sin conexión';
            statusSub.textContent   = 'Reintentando...';
            errCard.style.display   = 'block';
          }
        );
    }

    // ─── Sin autenticación: regla Firestore permite request.auth == null ────
    subscribeAlerts();

    // ─── Service Worker ──────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sae/sw.js', { scope: '/sae/' }).catch(() => {});
    }
  </script>
</body>
</html>
