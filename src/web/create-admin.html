<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario Admin - NeosTech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Crear Usuario Administrador</h1>
        
        <div class="info">
            <strong>📋 Instrucciones:</strong><br>
            1. Ingresa el email y contraseña deseados<br>
            2. Haz clic en "Crear Usuario Admin"<br>
            3. El usuario tendrá permisos completos del sistema
        </div>

        <form id="createAdminForm">
            <div class="form-group">
                <label for="email">📧 Email:</label>
                <input type="email" id="email" value="admin@neostech.local" required>
            </div>

            <div class="form-group">
                <label for="password">🔑 Contraseña:</label>
                <input type="password" id="password" value="Admin123!" required minlength="6">
            </div>

            <div class="form-group">
                <label for="displayName">👤 Nombre:</label>
                <input type="text" id="displayName" value="Administrador Sistema" required>
            </div>

            <button type="submit" id="submitBtn">Crear Usuario Admin</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBZ-XRSRgC2gz9E6zdYpes7yv5nLZtKmSw",
            authDomain: "neos-tech.firebaseapp.com",
            projectId: "neos-tech",
            storageBucket: "neos-tech.firebasestorage.app",
            messagingSenderId: "738411977369",
            appId: "1:738411977369:web:7facc71cea4c271d217608",
            measurementId: "G-DL4X5MX5JL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value;
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creando...';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';
            
            try {
                // Crear usuario en Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                console.log('✅ Usuario creado en Authentication:', user.uid);
                
                // Actualizar perfil
                await user.updateProfile({
                    displayName: displayName
                });
                
                // Crear documento en Firestore
                await db.collection('users').doc(user.uid).set({
                    email: email,
                    displayName: displayName,
                    role: 'admin',
                    permissions: {
                        manage_users: true,
                        manage_tags: true,
                        send_alerts: true,
                        view_logs: true,
                        manage_buildings: true
                    },
                    notifications_enabled: true,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    updated_at: firebase.firestore.FieldValue.serverTimestamp(),
                    active: true,
                    building_access: ['all'],
                    floor_access: ['all']
                });
                
                console.log('✅ Documento creado en Firestore');
                
                // Cerrar sesión (no queremos quedar logueados como admin)
                await auth.signOut();
                
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <strong>🎉 ¡Usuario administrador creado exitosamente!</strong><br><br>
                    📧 Email: ${email}<br>
                    🔑 Contraseña: ${password}<br>
                    👤 Nombre: ${displayName}<br>
                    🆔 UID: ${user.uid}<br><br>
                    <strong>✅ Ahora puedes hacer login en:</strong><br>
                    <a href="https://neos-tech.web.app" style="color: #667eea; font-weight: bold;">
                        https://neos-tech.web.app
                    </a><br><br>
                    ⚠️ <strong>IMPORTANTE:</strong> Cambia la contraseña después del primer login
                `;
                
                // Limpiar formulario
                document.getElementById('createAdminForm').reset();
                
            } catch (error) {
                console.error('❌ Error:', error);
                resultDiv.className = 'result error';
                
                let errorMessage = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Este email ya está registrado. Usa otro email o inicia sesión.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'La contraseña debe tener al menos 6 caracteres.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'El email no es válido.';
                }
                
                resultDiv.innerHTML = `
                    <strong>❌ Error al crear usuario:</strong><br>
                    ${errorMessage}
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Crear Usuario Admin';
            }
        });
    </script>
</body>
</html>
