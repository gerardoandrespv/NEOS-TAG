<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Push Notifications - NeosTech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .status-item {
            margin: 8px 0;
            font-size: 14px;
        }
        .status-label {
            font-weight: bold;
            color: #555;
        }
        .status-value {
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin: 10px 0;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        .log-entry.error {
            border-left-color: #e74c3c;
            color: #ff6b6b;
        }
        .log-entry.success {
            border-left-color: #2ecc71;
            color: #51cf66;
        }
        .log-entry.info {
            border-left-color: #3498db;
            color: #74c0fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Test de Notificaciones Push</h1>
        <p class="subtitle">Sistema de pruebas - NeosTech RFID Pro</p>

        <div class="status">
            <div class="status-item">
                <span class="status-label">Service Worker:</span>
                <span class="status-value" id="sw-status">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Permisos:</span>
                <span class="status-value" id="permission-status">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Token FCM:</span>
                <span class="status-value" id="token-status">Verificando...</span>
            </div>
        </div>

        <button id="requestPermission">🔓 Solicitar Permisos</button>
        <button id="sendTest" disabled>📤 Enviar Notificación de Prueba</button>
        <button id="clearLog">🗑️ Limpiar Log</button>

        <div class="log" id="log"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBZ-XRSRgC2gz9E6zdYpes7yv5nLZtKmSw",
            authDomain: "neos-tech.firebaseapp.com",
            projectId: "neos-tech",
            storageBucket: "neos-tech.firebasestorage.app",
            messagingSenderId: "738411977369",
            appId: "1:738411977369:web:7facc71cea4c271d217608",
            measurementId: "G-DL4X5MX5JL"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();
        const db = firebase.firestore();

        let currentToken = null;

        // Logging functions
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString('es-ES');
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message);
        }

        // Check Service Worker
        async function checkServiceWorker() {
            try {
                const registration = await navigator.serviceWorker.getRegistration('/firebase-messaging-sw.js');
                if (registration) {
                    document.getElementById('sw-status').textContent = '✅ Activo';
                    log('Service Worker registrado correctamente', 'success');
                    return true;
                } else {
                    document.getElementById('sw-status').textContent = '❌ No encontrado';
                    log('Service Worker no encontrado', 'error');
                    return false;
                }
            } catch (error) {
                document.getElementById('sw-status').textContent = '❌ Error';
                log(`Error al verificar Service Worker: ${error.message}`, 'error');
                return false;
            }
        }

        // Check notification permission
        function checkPermission() {
            const permission = Notification.permission;
            document.getElementById('permission-status').textContent = permission;
            
            if (permission === 'granted') {
                log('Permisos de notificación concedidos', 'success');
                return true;
            } else if (permission === 'denied') {
                log('Permisos de notificación denegados', 'error');
                return false;
            } else {
                log('Permisos de notificación pendientes', 'info');
                return false;
            }
        }

        // Request permission
        async function requestPermission() {
            try {
                log('Solicitando permisos de notificación...', 'info');
                const permission = await Notification.requestPermission();
                document.getElementById('permission-status').textContent = permission;
                
                if (permission === 'granted') {
                    log('✅ Permisos concedidos', 'success');
                    await getToken();
                    return true;
                } else {
                    log('❌ Permisos denegados', 'error');
                    return false;
                }
            } catch (error) {
                log(`Error al solicitar permisos: ${error.message}`, 'error');
                return false;
            }
        }

        // Get FCM token
        async function getToken() {
            try {
                log('Obteniendo token FCM...', 'info');
                const token = await messaging.getToken({
                    vapidKey: 'BJCUcC6Oi3jtGnRKzQPNjBmzMSP_WjOlX4q-kZwzVhVaEmHdQYzLvNnSwLgH_7xZN1C2uD8KCw4nTgP0Yp5xXyE'
                });
                
                if (token) {
                    currentToken = token;
                    const shortToken = token.substring(0, 20) + '...' + token.substring(token.length - 20);
                    document.getElementById('token-status').textContent = shortToken;
                    log(`✅ Token obtenido: ${shortToken}`, 'success');
                    
                    // Save to Firestore
                    await saveTokenToFirestore(token);
                    
                    document.getElementById('sendTest').disabled = false;
                    return token;
                } else {
                    log('❌ No se pudo obtener el token', 'error');
                    document.getElementById('token-status').textContent = '❌ No disponible';
                    return null;
                }
            } catch (error) {
                log(`Error al obtener token: ${error.message}`, 'error');
                document.getElementById('token-status').textContent = '❌ Error';
                return null;
            }
        }

        // Save token to Firestore
        async function saveTokenToFirestore(token) {
            try {
                log('Guardando token en Firestore...', 'info');
                const userId = 'test_user_' + Date.now();
                await db.collection('users').doc(userId).set({
                    fcm_token: token,
                    notifications_enabled: true,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    device: 'web',
                    user_agent: navigator.userAgent
                });
                log('✅ Token guardado en Firestore', 'success');
            } catch (error) {
                log(`Error al guardar token: ${error.message}`, 'error');
            }
        }

        // Send test notification
        async function sendTestNotification() {
            try {
                log('📤 Enviando notificación de prueba...', 'info');
                document.getElementById('sendTest').disabled = true;
                
                const response = await fetch('https://sendemergencypush-6psjv5t2ka-uc.a.run.app', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title: '🚨 Prueba de Sistema',
                        message: 'Esta es una notificación de prueba enviada desde el panel de testing',
                        severity: 'warning',
                        building: 'Edificio Test',
                        floor: '1',
                        apartment: 'N/A'
                    })
                });

                const result = await response.json();
                log(`✅ Respuesta del servidor: ${JSON.stringify(result)}`, 'success');
                
                if (result.success_count > 0) {
                    log(`🎉 Notificación enviada exitosamente a ${result.success_count} dispositivos`, 'success');
                } else {
                    log(`⚠️ No se enviaron notificaciones (${result.failure_count} fallos)`, 'error');
                }
                
                document.getElementById('sendTest').disabled = false;
            } catch (error) {
                log(`❌ Error al enviar notificación: ${error.message}`, 'error');
                document.getElementById('sendTest').disabled = false;
            }
        }

        // Event listeners
        document.getElementById('requestPermission').addEventListener('click', requestPermission);
        document.getElementById('sendTest').addEventListener('click', sendTestNotification);
        document.getElementById('clearLog').addEventListener('click', () => {
            document.getElementById('log').innerHTML = '';
            log('Log limpiado', 'info');
        });

        // Initialize
        async function init() {
            log('🚀 Iniciando sistema de pruebas...', 'info');
            await checkServiceWorker();
            const hasPermission = checkPermission();
            
            if (hasPermission) {
                await getToken();
            }
            
            log('✅ Sistema listo', 'success');
        }

        // Listen for foreground messages
        messaging.onMessage((payload) => {
            log('📩 Mensaje recibido en foreground:', 'success');
            log(JSON.stringify(payload, null, 2), 'info');
            
            // Show notification
            new Notification(payload.notification.title, {
                body: payload.notification.body,
                icon: '/assets/images/neostechc.png',
                tag: 'test-notification'
            });
        });

        init();
    </script>
</body>
</html>
